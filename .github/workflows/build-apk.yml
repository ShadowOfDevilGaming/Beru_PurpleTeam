name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: buildozer android debug
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Stable Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev \
            build-essential ccache git unzip \
            openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> "$GITHUB_PATH"

      - name: Install Buildozer and Pinned Cython
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install "Cython==0.29.36"
          pip install buildozer

      # Clean slate cache version to avoid previous zipped errors
      - name: Cache Buildozer Global Store
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}-v5

      # Directly pointing to GitHub's pre-installed Android tools
      - name: Build Android Debug APK
        run: |
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
          export ANDROID_HOME=/usr/local/lib/android/sdk
          yes | buildozer -v android debug

      - name: Locate Generated APK
        id: apk
        run: |
          set -e
          APK=$(find bin -maxdepth 1 -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced in bin/"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeruAI-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30