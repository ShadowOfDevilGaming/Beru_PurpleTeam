# Build the Beru AI debug APK.
# Strategy: p4a master + Kivy 2.3.0 (the tested combo). We pre-download and
# VERIFY the NDK before buildozer runs, so the corrupt-zip failure that broke
# every previous run can't happen. Cache key bumps to v3 to discard the old
# corrupt cache.

name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: buildozer android debug
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Stable Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Force Java 17 tightly to prevent gradlew environment failure
      - name: Set up Java 17 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev \
            build-essential ccache git unzip

      - name: Install Buildozer and Modern Cython
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install "Cython>=3.0.0"
          pip install buildozer

      # Bumped to v8 to start a completely clean compilation chain
      - name: Cache Buildozer Global Store
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}-v8

      - name: Patch Android SDK Manager Path
        run: |
          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          if [ -f "/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
            sudo ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
            echo "Patched using cmdline-tools/latest"
          elif [ -f "/usr/local/lib/android/sdk/cmdline-tools/11.0/bin/sdkmanager" ]; then
            sudo ln -sf /usr/local/lib/android/sdk/cmdline-tools/11.0/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
            echo "Patched using cmdline-tools/11.0"
          fi

      - name: Build Android Debug APK
        run: |
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724
          export ANDROID_HOME=/usr/local/lib/android/sdk
          yes | buildozer -v android debug

      - name: Locate Generated APK
        id: apk
        run: |
          set -e
          APK=$(find bin -maxdepth 1 -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK produced in bin/"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeruAI-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30